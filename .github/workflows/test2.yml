#######################################################################
#
# FileName: slackpost-debug.yml
# Author:   Jared Church
#
# Purpose:
#   Minimal reproduction of the shell quoting bug in air-ltd/slackpost@v4
#   action.yml. Demonstrates that single quotes in toJson(github) break
#   the PowerShell single-quoted string assignment.
#
#   The action.yml does:
#     $env:INPUT_GITHUB_CONTEXT='${{ inputs.GITHUB_CONTEXT }}'
#
#   When a PR contains single quotes in its body (e.g. `target.type ==
#   'clickhouse'`), those quotes terminate the PowerShell string early,
#   causing: '' in expression or statement.
#
#######################################################################

name: Slackpost Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Build fake github context with single quotes
      run: |
        # Simulates the JSON from a PR close event where the PR body
        # contains single quotes — e.g. markdown code like `target.type == 'clickhouse'`
        echo 'FAKE_CONTEXT={"event_name":"pull_request","job":"ETL","ref":"refs/heads/main","sha":"abc123","repository":"air-ltd/dwh","repository_owner":"air-ltd","run_id":"12345","run_number":"1","retention_days":"90","actor":"test-user","triggering_actor":"test-user","workflow":"ETL Action","workspace":"/tmp","action":"__air-ltd_slackpost","event":{"action":"closed","pull_request":{"body":"Refactors macros from `if target.type == '\''clickhouse'\''` to adapter.dispatch()","number":99,"title":"Test PR","state":"closed","merged":true}},"repository_id":"12345678"}' >> "$GITHUB_ENV"

    - name: Slack Post (reproduces the error)
      uses: air-ltd/slackpost@4ba43b24b7b071ea4c2063ba39a34adb527e35b0 # v4
      with:
        CONTENT: "Debug test — should fail due to single quotes in GITHUB_CONTEXT"
        SLACKURL: "https://hooks.slack.com/services/DO/NOT/REAL"
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_CONTEXT: ${{ env.FAKE_CONTEXT }}
        RUNNER: ${{ runner.environment }}
