name: Regression Test
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Secrets
        uses: bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # v3.0.0
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            dcb60857-1c1b-4749-b67c-b22b00730193 > SLACK_POST_URL


      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: set var
        shell: bash
        id: secret1
        env:
          SECRET: "test_secret"
        run: |
          echo "::add-mask::$SECRET"
          echo "slack_url=$SECRET" >> "$GITHUB_ENV"
          echo "message=$(printf 'a%.0s' {1..23})" >> "$GITHUB_ENV"
          echo "this is a file test" > log.txt
          echo "this is a file test - line 2" >> log.txt
          echo "msg_file=$(readlink -f log.txt)" >> "$GITHUB_ENV"

      - name: Test Env
        shell: pwsh
        run: |
          echo "Env File: $($env:msg_file)"

      - name: Run custom PowerShell action
        uses: air-ltd/slackpost@main
        with:
          CONTENT_FILE: ${{ env.msg_file }}
          CONTENT: ${{ env.message }}
          SLACKURL: ${{ env.SLACK_POST_URL }}
          TESTMODE: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CONTEXT: ${{ toJson(github) }}
          RUNNER: ${{ runner.environment }}
  
      - name: Run custom PowerShell action 2
        uses: air-ltd/slackpost@main
        with:
          CONTENT: ${{ env.message }}
          SLACKURL: ${{ env.SLACK_POST_URL }}
          TESTMODE: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CONTEXT: ${{ toJson(github) }}
          RUNNER: ${{ runner.environment }}
  
      - name: Run custom PowerShell action 3
        uses: air-ltd/slackpost@main
        with:
          CONTENT_FILE: ${{ env.msg_file }}
          SLACKURL: ${{ env.SLACK_POST_URL }}
          TESTMODE: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CONTEXT: ${{ toJson(github) }}
          RUNNER: ${{ runner.environment }}

      - name: Build fake github context with single quotes
        shell: bash
        run: |
          echo 'FAKE_CONTEXT={"event_name":"pull_request","job":"ETL","ref":"refs/heads/main","sha":"${{ github.sha }}","repository":"${{ github.repository }}","repository_owner":"${{ github.repository_owner }}","run_id":"${{ github.run_id }}","run_number":"${{ github.run_number }}","retention_days":"90","actor":"test-user","triggering_actor":"test-user","workflow":"ETL Action","workspace":"/tmp","action":"__air-ltd_slackpost","event":{"action":"closed","pull_request":{"body":"Refactors macros from `if target.type == '\''clickhouse'\''` to adapter.dispatch()","number":99,"title":"Test PR","state":"closed","merged":true}},"repository_id":"${{ github.repository_id }}"}' >> "$GITHUB_ENV"

      - name: Run custom PowerShell action (single-quote context test)
        uses: air-ltd/slackpost@main
        with:
          CONTENT: "Single-quote context test"
          SLACKURL: ${{ env.SLACK_POST_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CONTEXT: ${{ env.FAKE_CONTEXT }}
          RUNNER: ${{ runner.environment }}
          TESTMODE: true

      - name: Post workflow summary to Slack
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jobs_json=$(gh api -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs")
          passed=$(echo "$jobs_json" | jq '[.jobs[].conclusion] | map(select(. == "success")) | length')
          failed=$(echo "$jobs_json" | jq '[.jobs[].conclusion] | map(select(. == "failure")) | length')
          skipped=$(echo "$jobs_json" | jq '[.jobs[].conclusion] | map(select(. == "skipped")) | length')
          total=$(echo "$jobs_json" | jq '.jobs | length')
          summary="✅ ${passed} passed"
          if [ "$failed" -gt 0 ]; then summary="${summary} / ❌ ${failed} failed"; fi
          if [ "$skipped" -gt 0 ]; then summary="${summary} / ⏭ ${skipped} skipped"; fi
          summary="${summary} (of ${total})"
          echo "CONTENT=${summary}" >> "$GITHUB_ENV"

      - name: Send summary to Slack
        if: always()
        uses: air-ltd/slackpost@main
        with:
          SLACKURL: ${{ env.SLACK_POST_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_CONTEXT: ${{ toJson(github) }}
          RUNNER: ${{ runner.environment }}
          TESTMODE: false
