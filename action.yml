# yaml-language-server: $schema=https://json.schemastore.org/action.json
name: 'My Custom PowerShell Action'
description: 'A custom GitHub action written in PowerShell'
inputs:
  CONTENT_FILE:
    description: 'This is a fully qualified path to a file containing the content to post'
    required: false
  CONTENT:
    description: 'This is the content to be included in the slack post'
    required: false
  SLACKURL:
    description: 'This is full url for posting to slack'
    required: true
  TESTMODE:
    description: 'if set this will just output the json message rather than post'
    required: false
  RUNNER:
    description: 'info about the runner'
runs:
  using: 'composite'
  steps:
    - name: secrets
      shell: bash
      env:
        GH_CTX: ${{ toJson(github) }}
      run: |
        {
          echo "INPUT_SLACKURL<<INPUT_EOF"
          echo "${{ inputs.SLACKURL }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_RUNNER<<INPUT_EOF"
          echo "${{ inputs.RUNNER }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_CONTENT_FILE<<INPUT_EOF"
          echo "${{ inputs.CONTENT_FILE }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_CONTENT<<INPUT_EOF"
          echo "${{ inputs.CONTENT }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        if [ -n "${{ inputs.TESTMODE }}" ]; then
          {
            echo "INPUT_TESTMODE<<INPUT_EOF"
            echo "${{ inputs.TESTMODE }}"
            echo "INPUT_EOF"
          } >> $GITHUB_ENV
        fi
        echo "INPUT_GITHUB_CONTEXT<<GITHUB_CONTEXT_EOF" >> $GITHUB_ENV
        printenv GH_CTX >> $GITHUB_ENV
        echo "GITHUB_CONTEXT_EOF" >> $GITHUB_ENV
        echo "::add-mask::${{ github.token }}"
        echo "GH_TOKEN=${{ github.token }}" >> $GITHUB_ENV

    - name: Slack Posting
      shell: pwsh
      run: "${{ github.action_path }}/src/main.ps1"
