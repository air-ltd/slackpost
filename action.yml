# yaml-language-server: $schema=https://json.schemastore.org/action.json
name: 'My Custom PowerShell Action'
description: 'A custom GitHub action written in PowerShell'
inputs:
  CONTENT_FILE:
    description: 'This is a fully qualified path to a file containing the content to post'
    required: false
  CONTENT:
    description: 'This is the content to be included in the slack post'
    required: false
  SLACKURL:
    description: 'This is full url for posting to slack'
    required: true
  TESTMODE:
    description: 'if set this will just output the json message rather than post'
    required: false
  RUNNER:
    description: 'info about the runner'
  SUPPRESS_VERSION_WARNING:
    description: 'Set to true to suppress the version update warning'
    required: false
outputs:
  version_mismatch:
    description: 'Whether the action version is behind main'
    value: ${{ steps.version-check.outputs.version_mismatch }}
runs:
  using: 'composite'
  steps:
    - name: secrets
      shell: bash
      env:
        GH_CTX: ${{ toJson(github) }}
      run: |
        {
          echo "INPUT_SLACKURL<<INPUT_EOF"
          echo "${{ inputs.SLACKURL }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_RUNNER<<INPUT_EOF"
          echo "${{ inputs.RUNNER }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_CONTENT_FILE<<INPUT_EOF"
          echo "${{ inputs.CONTENT_FILE }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_CONTENT<<INPUT_EOF"
          echo "${{ inputs.CONTENT }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        if [ -n "${{ inputs.TESTMODE }}" ]; then
          {
            echo "INPUT_TESTMODE<<INPUT_EOF"
            echo "${{ inputs.TESTMODE }}"
            echo "INPUT_EOF"
          } >> $GITHUB_ENV
        fi
        if [ -n "${{ inputs.SUPPRESS_VERSION_WARNING }}" ]; then
          {
            echo "INPUT_SUPPRESS_VERSION_WARNING<<INPUT_EOF"
            echo "${{ inputs.SUPPRESS_VERSION_WARNING }}"
            echo "INPUT_EOF"
          } >> $GITHUB_ENV
        fi
        echo "INPUT_GITHUB_CONTEXT<<GITHUB_CONTEXT_EOF" >> $GITHUB_ENV
        printenv GH_CTX >> $GITHUB_ENV
        echo "GITHUB_CONTEXT_EOF" >> $GITHUB_ENV
        echo "::add-mask::${{ github.token }}"
        echo "GH_TOKEN=${{ github.token }}" >> $GITHUB_ENV

    - name: Slack Posting
      shell: pwsh
      run: "${{ github.action_path }}/src/main.ps1"

    - name: Version Check
      id: version-check
      if: ${{ inputs.SUPPRESS_VERSION_WARNING != 'true' }}
      shell: pwsh
      run: |
        $ctx = $env:INPUT_GITHUB_CONTEXT | ConvertFrom-Json
        $repo = $ctx.action_repository
        $ref = $ctx.action_ref

        $hash = (gh api "repos/$($repo)/commits?sha=$($ref)&per_page=1" | ConvertFrom-Json).sha
        $hash_latest = (gh api "repos/$($repo)/commits?sha=main&per_page=1" | ConvertFrom-Json).sha

        Write-Output "Action ref: $($ref)"
        Write-Output "Current version: $($hash)"
        Write-Output "Latest on main: $($hash_latest)"

        if ( $hash -ne $hash_latest ) {
          Write-Output "::warning::You are using $($repo)@$($ref) ($($hash.Substring(0,7))), but the latest version on main is $($hash_latest.Substring(0,7)). Consider updating."
          "version_mismatch=true" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
        } else {
          Write-Output "You are using the latest version of $($repo)@main."
          "version_mismatch=false" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
        }


