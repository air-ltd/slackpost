# yaml-language-server: $schema=https://json.schemastore.org/action.json
name: 'My Custom PowerShell Action'
description: 'A custom GitHub action written in PowerShell'
inputs:
  CONTENT_FILE:
    description: 'This is a fully qualified path to a file containing the content to post'
    required: false
  CONTENT:
    description: 'This is the content to be included in the slack post'
    required: false
  SLACKURL:
    description: 'This is full url for posting to slack'
    required: true
  TESTMODE:
    description: 'if set this will just output the json message rather than post'
    required: false
  RUNNER:
    description: 'info about the runner'
  SUPPRESS_VERSION_WARNING:
    description: 'Set to true to suppress the warning when a newer version of this action is available'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: secrets
      shell: bash
      env:
        GH_CTX: ${{ toJson(github) }}
      run: |
        {
          echo "INPUT_SLACKURL<<INPUT_EOF"
          echo "${{ inputs.SLACKURL }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_RUNNER<<INPUT_EOF"
          echo "${{ inputs.RUNNER }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_CONTENT_FILE<<INPUT_EOF"
          echo "${{ inputs.CONTENT_FILE }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        {
          echo "INPUT_CONTENT<<INPUT_EOF"
          echo "${{ inputs.CONTENT }}"
          echo "INPUT_EOF"
        } >> $GITHUB_ENV
        if [ -n "${{ inputs.TESTMODE }}" ]; then
          {
            echo "INPUT_TESTMODE<<INPUT_EOF"
            echo "${{ inputs.TESTMODE }}"
            echo "INPUT_EOF"
          } >> $GITHUB_ENV
        fi
        echo "INPUT_GITHUB_CONTEXT<<GITHUB_CONTEXT_EOF" >> $GITHUB_ENV
        printenv GH_CTX >> $GITHUB_ENV
        echo "GITHUB_CONTEXT_EOF" >> $GITHUB_ENV
        echo "::add-mask::${{ github.token }}"
        echo "GH_TOKEN=${{ github.token }}" >> $GITHUB_ENV

    - name: Ensure jq
      if: ${{ inputs.SUPPRESS_VERSION_WARNING != 'true' }}
      shell: bash
      run: |
        if ! command -v jq &>/dev/null; then
          echo "jq is not installed, attempting to install..."
          if command -v apt-get &>/dev/null; then
            sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq jq
          elif command -v brew &>/dev/null; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install jq
          else
            echo "Unable to install jq, skipping version check."
          fi
        fi

    - name: Check for action updates
      if: ${{ inputs.SUPPRESS_VERSION_WARNING != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if ! command -v jq &>/dev/null; then
          echo "jq not available, skipping version check."
          exit 0
        fi

        REPO=$(echo "$INPUT_GITHUB_CONTEXT" | jq -r '.action_repository // .action // empty')
        REF=$(echo "$INPUT_GITHUB_CONTEXT" | jq -r '.action_ref // empty')
        ACTION_PATH=$(echo "$INPUT_GITHUB_CONTEXT" | jq -r '.action_path // empty')

        if [ -z "$REPO" ] || [ -z "$REF" ]; then
          echo "Unable to determine action repository or ref from github context, skipping version check."
          exit 0
        fi

        CURRENT_SHA=""
        if [ -n "$ACTION_PATH" ] && [ -d "$ACTION_PATH/.git" ]; then
          CURRENT_SHA=$(git -C "$ACTION_PATH" rev-parse HEAD 2>/dev/null)
        fi
        if [ -z "$CURRENT_SHA" ] && echo "$REF" | grep -qE '^[0-9a-f]{40}$'; then
          CURRENT_SHA="$REF"
        fi

        if [ -z "$CURRENT_SHA" ]; then
          echo "Unable to determine current action commit SHA, skipping version check."
          exit 0
        fi

        LATEST_SHA=$(gh api "repos/${REPO}/git/ref/heads/${REF}" --jq '.object.sha' 2>/dev/null)
        if [ -z "$LATEST_SHA" ]; then
          LATEST_SHA=$(gh api "repos/${REPO}/git/ref/tags/${REF}" --jq '.object.sha' 2>/dev/null)
        fi
        if [ -z "$LATEST_SHA" ]; then
          LATEST_SHA=$(gh api "repos/${REPO}/commits?sha=${REF}&per_page=1" --jq '.[0].sha' 2>/dev/null)
        fi

        if [ -z "$LATEST_SHA" ]; then
          echo "Unable to fetch latest commit for ${REPO}@${REF}, skipping version check."
          exit 0
        fi

        if [ "$CURRENT_SHA" != "$LATEST_SHA" ]; then
          echo "::warning::You are using ${REPO}@${REF} (${CURRENT_SHA:0:7}), but the latest version on ${REF} is ${LATEST_SHA:0:7}. Consider updating to the latest version."
        else
          echo "You are using the latest version of ${REPO}@${REF}."
        fi

    - name: step 1
      shell: pwsh
      run: "${{ github.action_path }}/src/main.ps1"
